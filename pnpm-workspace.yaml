packages:
  - apps/*
  - packages/*

allowBuilds:
  '@prisma/engines': set this to true or false
  '@sentry/cli': set this to true or false
  cpu-features: set this to true or false
  esbuild: set this to true or false
  fallow: set this to true or false
  msw: set this to true or false
  prisma: set this to true or false
  protobufjs: set this to true or false
  sharp: set this to true or false
  ssh2: set this to true or false

nodeLinker: hoisted

onlyBuiltDependencies:
  - "@parcel/watcher"
  - "@prisma/client"
  - "@prisma/engines"
  - "@swc/core"
  - "@tailwindcss/oxide"
  - esbuild
  - fallow
  - prisma
  - sharp
  - unrs-resolver
