name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CI: true
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      BETTER_AUTH_SECRET: test-secret-minimum-32-characters-long-for-e2e
      WEB_APP_URL: http://localhost:3000
      REDIS_URL: ${{ secrets.REDIS_URL }}
      # Drives the auth-email/ specs. When absent (forks, contributors without
      # access), those specs `test.skip()` themselves — the rest of the suite
      # still runs.
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      # Verified Resend domain — required so the auth-email/* specs can
      # deliver to `delivered+<label>@resend.dev`. The code fallback
      # `onboarding@resend.dev` boots without errors but Resend silently
      # restricts that sender to test mode (account-owner email only).
      RESEND_FROM_EMAIL: noreply@email.collabtime.io
      # Disable Sentry in CI: the tunnel proxy + browser SDK can't reach
      # ingest.us.sentry.io from GH runners and hangs Playwright's
      # networkidle waits. NEXT_PUBLIC_ prefix is required so the value
      # gets inlined into the client bundle at build time.
      NEXT_PUBLIC_DISABLE_SENTRY: "true"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm db:push
      - run: pnpm build
      - name: Seed E2E test user
        run: pnpm --filter @repo/web exec tsx scripts/ensure-e2e-user.ts
      # Canonical Playwright CI pattern (playwright.dev/docs/ci): browser
      # download + apt system deps in one step. Caching is explicitly
      # *not* recommended by the docs — restore time is comparable to a
      # fresh download. CI runs the chromium project only
      # (playwright.config.ts filters firefox/webkit out under CI).
      - name: Install Playwright browsers and system deps
        run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
