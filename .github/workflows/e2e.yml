name: E2E Tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CI: true
      DATABASE_URL: postgresql://collabtime:collabtime123@localhost:5432/collabtime
      BETTER_AUTH_SECRET: e2e-test-secret-at-least-32-characters-long
      BETTER_AUTH_URL: http://localhost:3000
      WEB_APP_URL: http://localhost:3000
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: collabtime
          POSTGRES_PASSWORD: collabtime123
          POSTGRES_DB: collabtime
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U collabtime -d collabtime"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm db:generate
      - run: pnpm db:push

      - name: Get Playwright version
        id: pw
        run: echo "version=$(pnpm exec playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        id: pw-cache
        with:
          path: |
            ~/.cache/ms-playwright
            /var/cache/apt/archives
          key: pw-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - run: pnpm exec playwright test --project=setup --project=chromium

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
